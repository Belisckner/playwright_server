version: "3"

services:
  playwright-1.56.1:
    image: mcr.microsoft.com/playwright:v1.56.1-noble
    container_name: playwright-1.56.1
    # Запускаем серверный режим
    command: npx -y playwright@1.56.1 run-server --path=/lala --port 8080 --host 0.0.0.0
    ports:
      - "12000:8080"   # хост:контейнер
    # Важно для стабильной работы Chromium
    shm_size: 2gb
    restart: unless-stopped

  playwright-1.59.1:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    container_name: playwright-1.59.1
    command: npx -y playwright@1.59.1 run-server --path=/lala --port 8080 --host 0.0.0.0
    ports:
      - "12001:8080"   # другой порт на хосте
    shm_size: 2gb
    restart: unless-stopped